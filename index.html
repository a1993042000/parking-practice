<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>停車練習 · Parking Practice</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <header>
    <div class="title">🅿️ 停車練習 <span class="sub">上帝視角</span></div>
    <div class="level-nav">
      <button id="prevLevel" title="上一關">◀</button>
      <span id="levelLabel">關卡</span>
      <button id="nextLevel" title="下一關">▶</button>
    </div>
  </header>

  <div id="stage">
    <canvas id="game"></canvas>
    <div id="banner" class="hidden"></div>
  </div>

  <div id="hud">
    <div class="hud-item">關卡 <b id="hudLevel">1</b></div>
    <div class="hud-item">難度 <b id="hudDiff">★</b></div>
    <div class="hud-item">碰撞 <b id="hudBumps">0</b></div>
    <div class="hud-item">時間 <b id="hudTime">0.0s</b></div>
  </div>

  <div id="controls">
    <div class="sliders">
      <label>車長 <span id="lenVal">4.6</span> m
        <input type="range" id="carLen" min="3.4" max="6.0" step="0.1" value="4.6" />
      </label>
      <label>車寬 <span id="widVal">1.9</span> m
        <input type="range" id="carWid" min="1.5" max="2.2" step="0.1" value="1.9" />
      </label>
      <label>軸距 <span id="wbVal">2.70</span> m
        <input type="range" id="carWb" min="1.8" max="3.4" step="0.05" value="2.70" />
      </label>
      <label class="toggle"><input type="checkbox" id="showTracks" checked /> 顯示輪胎軌跡（看內輪差）</label>
      <button id="resetBtn" class="btn">重置 (R)</button>
    </div>

    <div id="wheelWrap">
      <svg id="wheel" viewBox="-100 -100 200 200" aria-label="方向盤">
        <g id="wheelRot">
          <circle cx="0" cy="0" r="84" fill="none" stroke="#20262d" stroke-width="22"/>
          <circle cx="0" cy="0" r="84" fill="none" stroke="#5b6675" stroke-width="12"/>
          <g fill="#4a525c">
            <rect x="0" y="-7" width="80" height="14" rx="7"/>
            <g transform="rotate(120)"><rect x="0" y="-7" width="80" height="14" rx="7"/></g>
            <g transform="rotate(240)"><rect x="0" y="-7" width="80" height="14" rx="7"/></g>
          </g>
          <circle cx="0" cy="0" r="24" fill="#4aa3ff"/>
          <rect x="-6" y="-94" width="12" height="22" rx="4" fill="#ff5d52"/>
        </g>
      </svg>
      <div class="wheel-info">
        <span id="wheelAngle">回正</span>
        <button id="wheelCenter" class="btn">↺ 回正</button>
      </div>
    </div>

    <div class="pad">
      <div class="pad-row">
        <button class="dpad" data-act="up">▲</button>
      </div>
      <div class="pad-row">
        <button class="dpad" data-act="left">◀</button>
        <button class="dpad" data-act="down">▼</button>
        <button class="dpad" data-act="right">▶</button>
      </div>
    </div>
  </div>

  <p id="hint">操作：<b>左／右</b>方向鍵轉動下方方向盤（放開後會<b>保持角度、不自動回正</b>，按「↺ 回正」可歸零）；<b>上／下</b>方向鍵前進／後退，<b>鬆開立刻停車</b>（不會滑行）。R 重置。只有<b>前輪</b>會轉向、後輪固定，轉彎時後輪會內切（內輪差）——橘色是後輪軌跡、藍色是前輪。把車「完整開進」綠色車位並對正即過關。</p>
  <p id="desc"></p>
</div>
<script src="game.js"></script>
</body>
</html>
